// app/build.gradle — RN 0.86 canonical Groovy DSL setup.
//
// Adapted from the RN 0.86 template. Differences vs. the default template:
//   - Added signingConfigs.release that reads from keystore.properties (with
//     fallback to debug.keystore for dev builds)
//   - Added ndk.abiFilters to limit to arm64-v8a + x86_64 (sharp-wasm32 + nodejs-mobile)
//   - Added BuildConfig fields (IS_NEW_ARCHITECTURE_ENABLED, IS_HERMES_ENABLED)
//     — actually RN 0.86 generates these automatically via the rootproject plugin,
//     but declaring them explicitly is harmless and makes MainApplication.kt
//     compile cleanly even if the plugin's auto-generation is delayed.
//   - Added packagingOptions.pickFirst for libc++_shared.so (nodejs-mobile vs RN)
//   - Added dependencies for androidx.core + androidx.appcompat (used by SafSyncModule)

apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * React Native Gradle Plugin configuration.
 */
react {
    autolinkLibrariesWithApp()
}

/**
 * Set this to true to Run Proguard on Release builds to minify the Java bytecode.
 */
def enableProguardInReleaseBuilds = false

/**
 * The preferred build flavor of JavaScriptCore (JSC)
 */
def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.obsidian.server"
    defaultConfig {
        applicationId "com.obsidian.server"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"

        // nodejs-mobile ships native Node binaries for these ABIs.
        //   arm64-v8a → all modern Android phones (≥99% of devices)
        //   x86_64    → Android emulator / ChromeOS
        // We exclude armeabi-v7a and x86 (32-bit) to keep the APK small and
        // because @img/sharp-wasm32 doesn't ship prebuilts for them either.
        ndk {
            abiFilters "arm64-v8a", "x86_64"
        }
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Read keystore.properties if present; fall back to debug signing.
            def keystoreProps = new Properties()
            def keystorePropsFile = rootProject.file('app/keystore.properties')
            if (keystorePropsFile.exists()) {
                keystoreProps.load(new FileInputStream(keystorePropsFile))
                storeFile file(keystoreProps['storeFile'])
                storePassword keystoreProps['storePassword']
                keyAlias keystoreProps['keyAlias']
                keyPassword keystoreProps['keyPassword']
            } else {
                // No keystore.properties — fall back to debug signing so the
                // APK is still installable during development.
                storeFile file('debug.keystore')
                storePassword 'android'
                keyAlias 'androiddebugkey'
                keyPassword 'android'
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
            debuggable true
        }
        release {
            // Caution! In production, you need to generate your own keystore file.
            // see https://reactnative.dev/docs/signed-apk-android.
            signingConfig signingConfigs.release
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }

    packagingOptions {
        // Force-resolve libc++_shared.so conflicts (nodejs-mobile vs RN).
        pickFirst '**/libc++_shared.so'
        pickFirst '**/libfbjni.so'
        // Exclude duplicate license files that ship in multiple deps.
        exclude 'META-INF/DEPENDENCIES'
        exclude 'META-INF/LICENSE'
        exclude 'META-INF/LICENSE.txt'
        exclude 'META-INF/license.txt'
        exclude 'META-INF/NOTICE'
        exclude 'META-INF/NOTICE.txt'
        exclude 'META-INF/notice.txt'
        exclude 'META-INF/ASL2.0'
        exclude 'META-INF/*.kotlin_module'
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // AndroidX deps used by SafSyncModule.kt and the AppCompat theme.
    implementation("androidx.core:core-ktx:1.13.1")
    implementation("androidx.appcompat:appcompat:1.7.0")
}
